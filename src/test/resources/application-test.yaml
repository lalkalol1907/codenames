spring:
  datasource:
    url: jdbc:h2:mem:codenames-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  session:
    store-type: none

app:
  environment: test
  public-url: http://localhost
  secure-cookies: false
  session-secret: test-secret-for-unit-tests!!
  expose-api-docs: false
  scaling:
    redis-enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
