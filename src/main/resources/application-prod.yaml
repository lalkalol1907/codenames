server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/codenames}
    username: ${DATABASE_USER:codenames}
    password: ${DATABASE_PASSWORD:codenames}
    driver-class-name: ${DATABASE_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: 10
  session:
    store-type: redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

app:
  environment: prod
  public-url: ${APP_PUBLIC_URL:http://localhost:8080}
  secure-cookies: true
  session-secret: ${SESSION_SECRET:replace-with-long-random-secret}
  expose-api-docs: false
  scaling:
    redis-enabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
