# Production HTTP only (no TLS). For HTTPS use application-prod-https.yaml.
ktor:
  deployment:
    host: 0.0.0.0
    port: 8080
  application:
    modules:
      - com.lalkalol.config.AppSettingsKt.configureAppSettings
      - com.lalkalol.config.HttpKt.configureHttp
      - com.lalkalol.config.DIKt.configureDependencyInjection
      - com.lalkalol.config.SecurityKt.configureSecurity
      - com.lalkalol.config.DatabaseKt.configureDatabase
      - com.lalkalol.config.HealthKt.configureHealth
      - com.lalkalol.config.SessionsKt.configureSessions
      - com.lalkalol.web.WebSocketsKt.configureWebSockets
      - com.lalkalol.config.RoutingKt.configureRouting

app:
  environment: prod
  publicUrl: "https://example.com"
  secureCookies: true
  sessionSecret: "replace-with-long-random-secret"
  exposeApiDocs: false

database:
  url: "jdbc:postgresql://localhost:5432/codenames"
  driver: org.postgresql.Driver
  user: codenames
  password: codenames
  poolSize: 10
