openapi: "3.0.3"
info:
  title: Codenames
  description: |
    JSON API для мультиплеерной игры Codenames.

    UI — Vue SPA (статика в `/static/`). Маршруты вроде `/`, `/rooms/{code}` отдают
    `index.html`; данные загружаются через `/api/*`.

    **Сессия:** после create/join устанавливается httpOnly cookie `player_session`.

    **CSRF:** для `POST`/`PUT`/`PATCH`/`DELETE` нужны cookie `csrf_token` и заголовок
    `X-CSRF-Token` с тем же значением. Токен выдаёт `GET /api/csrf`.

    **Rate limit:** `POST /api/rooms`, `POST /api/rooms/join` и room-actions
    (`/join`, `/role`, `/randomize`, `/start`) — не более 30 запросов в минуту на клиента.

    **WebSocket:** состояние комнаты в реальном времени — `GET /ws/rooms/{code}`.
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: auth
    description: CSRF and session
  - name: i18n
    description: UI translations
  - name: rooms
    description: Room lifecycle (create, join, lobby, start)
  - name: health
    description: Liveness and readiness probes
  - name: websocket
    description: Real-time game state

paths:
  /api/csrf:
    get:
      tags: [auth]
      summary: Get CSRF token
      description: |
        Sets `csrf_token` cookie (if missing) and returns the token for the
        `X-CSRF-Token` request header.
      security: []
      responses:
        "200":
          description: CSRF token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"

  /api/session:
    get:
      tags: [auth]
      summary: Current player session
      description: Returns player and room from `player_session` cookie, or empty fields.
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"

  /api/i18n:
    get:
      tags: [i18n]
      summary: UI message bundle
      parameters:
        - name: locale
          in: query
          required: false
          schema:
            type: string
            enum: [ru, en]
          description: Locale code; defaults to cookie or `Accept-Language`.
      security: []
      responses:
        "200":
          description: Flat map of message keys to translated strings
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  /api/locale:
    post:
      tags: [i18n]
      summary: Set UI locale
      description: Sets `ui_locale` cookie. Requires CSRF.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLocaleRequest"
      responses:
        "204":
          description: Locale updated
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms:
    post:
      tags: [rooms]
      summary: Create a room
      description: Creates a room and sets `player_session` for the host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoomRequest"
      responses:
        "200":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomActionResponse"
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms/join:
    post:
      tags: [rooms]
      summary: Join a room by code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomRequest"
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomActionResponse"
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms/{code}:
    get:
      tags: [rooms]
      summary: Room bootstrap
      description: |
        Without a valid session for this room — `needJoin: true`.
        With session — personalized `RoomViewDto` for lobby or game.
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      responses:
        "200":
          description: Bootstrap payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomBootstrapDto"
        "404":
          description: Room not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms/{code}/options:
    get:
      tags: [rooms]
      summary: Lobby form options
      description: Localized team and role labels for the role picker.
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      security: []
      responses:
        "200":
          description: Select options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomOptionsDto"

  /api/rooms/{code}/join:
    post:
      tags: [rooms]
      summary: Join room by direct link
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRoomInCodeRequest"
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomActionResponse"
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms/{code}/role:
    post:
      tags: [rooms]
      summary: Choose team and role
      description: Requires session. Only while room status is LOBBY.
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleRequest"
      responses:
        "204":
          description: Role saved; clients receive WS state update
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not in room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms/{code}/randomize:
    post:
      tags: [rooms]
      summary: Randomize team assignments
      description: Host only. Requires exactly 4 players in lobby.
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      responses:
        "204":
          description: Teams randomized
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not in room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/rooms/{code}/start:
    post:
      tags: [rooms]
      summary: Start the game
      description: |
        Host only. Requires at least 4 players with exactly one spymaster
        and one operative per team.
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      responses:
        "204":
          description: Game started; clients receive WS state update
        "400":
          description: Validation or business error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not in room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Invalid CSRF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Process is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /health/ready:
    get:
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: App and database are ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  database:
                    type: string
                    example: up
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: degraded
                  database:
                    type: string
                    example: down

  /ws/rooms/{code}:
    get:
      tags: [websocket]
      summary: Game WebSocket
      description: |
        Upgrade to WebSocket. Requires valid `player_session` cookie for the room.

        **Client → server**
        - `{"type":"give_clue","word":"...","count":3}` — spymaster of active team
        - `{"type":"guess","index":12}` — operative during guessing phase
        - `{"type":"end_turn"}` — operative ends turn early

        **Server → client**
        - `{"type":"state","view":RoomViewDto}` — role-aware room/game state
        - `{"type":"error","message":"..."}` — localized error text
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      responses:
        "101":
          description: Switching Protocols (WebSocket)
        "403":
          description: Missing or invalid session

components:
  parameters:
    RoomCode:
      name: code
      in: path
      required: true
      schema:
        type: string
        minLength: 4
        maxLength: 4
        pattern: "^[A-Za-z0-9]{4}$"
      description: Four-character room code (case-insensitive).

  schemas:
    Language:
      type: string
      enum: [ru, en]

    Team:
      type: string
      enum: [RED, BLUE]

    Role:
      type: string
      enum: [SPYMASTER, OPERATIVE]

    RoomStatus:
      type: string
      enum: [LOBBY, PLAYING, FINISHED]

    GamePhase:
      type: string
      enum: [CLUE, GUESSING]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Localized error message.
        needJoin:
          type: boolean
          default: false

    CsrfResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    SessionResponse:
      type: object
      properties:
        playerId:
          type: string
          format: uuid
          nullable: true
        roomCode:
          type: string
          nullable: true

    SetLocaleRequest:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
          enum: [ru, en]

    CreateRoomRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64
          description: Display name of the host player.
        language:
          $ref: "#/components/schemas/Language"
          default: en

    JoinRoomRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 4
          pattern: "^[A-Za-z0-9]{4}$"
        name:
          type: string
          maxLength: 64

    JoinRoomInCodeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 64

    SetRoleRequest:
      type: object
      required: [team, role]
      properties:
        team:
          $ref: "#/components/schemas/Team"
        role:
          $ref: "#/components/schemas/Role"

    RoomActionResponse:
      type: object
      required: [code, viewerId]
      properties:
        code:
          type: string
        viewerId:
          type: string
          format: uuid

    EnumOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    RoomOptionsDto:
      type: object
      required: [teams, roles]
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/EnumOption"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/EnumOption"

    RoomBootstrapDto:
      type: object
      required: [code, language, needJoin]
      properties:
        code:
          type: string
        language:
          $ref: "#/components/schemas/Language"
        needJoin:
          type: boolean
        view:
          allOf:
            - $ref: "#/components/schemas/RoomViewDto"
          nullable: true

    CardView:
      type: object
      properties:
        position:
          type: integer
          minimum: 0
          maximum: 24
        word:
          type: string
        type:
          type: string
          nullable: true
          description: Card color; null for operatives until the card is revealed.
          enum: [RED, BLUE, NEUTRAL, ASSASSIN]
        revealed:
          type: boolean

    PlayerViewDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        team:
          allOf:
            - $ref: "#/components/schemas/Team"
          nullable: true
        role:
          allOf:
            - $ref: "#/components/schemas/Role"
          nullable: true
        isHost:
          type: boolean

    GameViewDto:
      type: object
      properties:
        currentTeam:
          $ref: "#/components/schemas/Team"
        phase:
          $ref: "#/components/schemas/GamePhase"
        clueWord:
          type: string
          nullable: true
        clueCount:
          type: integer
          nullable: true
        guessesRemaining:
          type: integer
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CardView"
        winner:
          allOf:
            - $ref: "#/components/schemas/Team"
          nullable: true
        redRemaining:
          type: integer
        blueRemaining:
          type: integer

    RoomViewDto:
      type: object
      description: Personalized room state (REST bootstrap and WebSocket updates).
      properties:
        status:
          $ref: "#/components/schemas/RoomStatus"
        hostPlayerId:
          type: string
          format: uuid
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerViewDto"
        game:
          allOf:
            - $ref: "#/components/schemas/GameViewDto"
          nullable: true
        viewerId:
          type: string
          format: uuid
        canGiveClue:
          type: boolean
        canGuess:
          type: boolean
        canEndTurn:
          type: boolean
        canStart:
          type: boolean
        canRandomizeTeams:
          type: boolean

    WsGiveClueMessage:
      type: object
      required: [type, word, count]
      properties:
        type:
          type: string
          enum: [give_clue]
        word:
          type: string
        count:
          type: integer
          minimum: 1

    WsGuessMessage:
      type: object
      required: [type, index]
      properties:
        type:
          type: string
          enum: [guess]
        index:
          type: integer
          minimum: 0
          maximum: 24

    WsEndTurnMessage:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [end_turn]

    WsStateMessage:
      type: object
      required: [type, view]
      properties:
        type:
          type: string
          enum: [state]
        view:
          $ref: "#/components/schemas/RoomViewDto"

    WsErrorMessage:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string

  securitySchemes:
    PlayerSessionCookie:
      type: apiKey
      in: cookie
      name: player_session
      description: Ktor session cookie set after create/join room.
    CsrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Must match the `csrf_token` cookie on mutating requests.

security:
  - PlayerSessionCookie: []
