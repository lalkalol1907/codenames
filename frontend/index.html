<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codeword</title>
    <script>
      (function () {
        var t = localStorage.getItem('ui_theme');
        if (t === 'midnight' || t === 'light') document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
