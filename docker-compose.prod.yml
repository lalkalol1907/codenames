# Scale app replicas:
#   docker compose -f docker-compose.prod.yml up -d --scale app=3
services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    networks:
      - codenames-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codenames}
      POSTGRES_USER: ${POSTGRES_USER:-codenames}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codenames}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-umami.sql:/docker-entrypoint-initdb.d/02-umami.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codenames} -d ${POSTGRES_DB:-codenames}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - codenames-network
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "redis-server --save 60 1 --loglevel warning $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    env_file:
      - .env
    networks:
      - codenames-network
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-codenames}
      DATABASE_USER: ${POSTGRES_USER:-codenames}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-codenames}
      DATABASE_DRIVER: org.postgresql.Driver
      SESSION_SECRET: ${SESSION_SECRET}
      APP_ENV: prod
      APP_PUBLIC_URL: https://${APP_DOMAIN}
      APP_SECURE_COOKIES: "true"
      APP_EXPOSE_API_DOCS: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    networks:
      - codenames-network
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ANALYTICS_DOMAIN: ${ANALYTICS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    env_file:
      - .env
    networks:
      - codenames-network
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD:-umami}@db:5432/${UMAMI_DB_NAME:-umami}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

networks:
  codenames-network:
    external: false

volumes:
  redis-data:
  caddy-data:
  caddy-config:
