name: CI

# push / pull_request — lint + test на любых ветках и PR.
# build + deploy — только при push тега v* (refs/tags/v1.0.0 и т.д.).
# workflow_dispatch — ручной запуск lint + test (без сборки и деплоя).
#
# Lint/test jobs use continue-on-error on PRs and branch pushes so checks are
# informational. Release tag builds (refs/tags/v*) require green lint + tests.
on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-lint:
    continue-on-error: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck app
        working-directory: frontend
        run: pnpm run typecheck

      - name: Typecheck Vite config
        working-directory: frontend
        run: pnpm run typecheck:node

      - name: ESLint
        working-directory: frontend
        run: pnpm run lint

      - name: Prettier
        working-directory: frontend
        run: pnpm run format:check

  frontend-test:
    continue-on-error: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    needs: frontend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        working-directory: frontend
        run: pnpm test

  test:
    continue-on-error: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: temurin
          cache: gradle

      - name: Unit tests
        run: ./gradlew test -PskipFrontendBuild --no-daemon

  build:
    needs: [test, frontend-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_PUBLIC_URL=${{ secrets.VITE_PUBLIC_URL }}
            VITE_DISCORD_CLIENT_ID=${{ secrets.VITE_DISCORD_CLIENT_ID }}

  # Только push тега v*; после успешной сборки образа.
  # Секреты: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH, DEPLOY_DOTENV;
  # DOCKERHUB_USERNAME + DOCKERHUB_TOKEN — для docker login на сервере (лимит anonymous pull).
  # опционально DEPLOY_SSH_KEY_PASSPHRASE — passphrase от ключа, если ключ зашифрован.
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (docker compose)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DOTENV: ${{ secrets.DEPLOY_DOTENV }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          envs: DEPLOY_DOTENV,DEPLOY_PATH,IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            printf '%s\n' "$DEPLOY_DOTENV" > .env
            export IMAGE_TAG
            echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
