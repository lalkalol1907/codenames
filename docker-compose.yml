services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codenames
      POSTGRES_USER: codenames
      POSTGRES_PASSWORD: codenames
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codenames -d codenames"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/codenames
      DATABASE_USER: codenames
      DATABASE_PASSWORD: codenames
      DATABASE_DRIVER: org.postgresql.Driver
      SESSION_SECRET: change-me-to-a-long-random-string
      APP_ENV: prod
      APP_PUBLIC_URL: http://localhost:8080
      APP_SECURE_COOKIES: "false"
      APP_EXPOSE_API_DOCS: "false"
    depends_on:
      db:
        condition: service_healthy
    command:
      - ./bin/codenames
      - -config=application-prod.yaml
